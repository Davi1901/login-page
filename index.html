<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de login moderna">
    <meta name="author" content="Davi Bitencourt da Rocha">
    <meta name="keywords" content="Login, HTML, CSS, Cadastro, Conta">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>

<body>
    <div class="estrelas"></div>
    <div class="formulario">
        <h1>Login</h1>
        <form action="#">
            <div class="caixa-formulario">
                <input type="text" name="nome" id="nome" placeholder="Digite o seu nome" required>
                <i class="bx bx-user-hexagon" class="firt-icon"></i>
            </div>

            <div class="caixa-formulario">
                <input type="password" name="senha" id="senha" placeholder="Digite a sua senha" required>
                <i class="bx bx-lock"></i>
            </div>

                    <div class="caixa-lembrar-esqueci">
                        <label><input type="checkbox" name="caixa" id="caixa">Lembrar</label>

                        <a href="#">Esqueci minha senha</a>
                    </div>

                    <button type="submit">Entrar</button>

                    <div class="link-registro">
                        <p>Não tem uma conta? <a href="#">registrar</a></p>
                    </div>
        </form>
    </div>
</body>

</html>
